<!DOCTYPE html>
<html>
<head>
<style>
.sponsors-title { 
  font-family: 'Arial', sans-serif; 
  font-size: 1.4rem; 
  font-weight: 900; 
  letter-spacing: 0.6em; 
  text-transform: uppercase; 
  color: #0d3b66; 
  text-shadow: 0 2px 4px rgba(0,0,0,0.2); 
}
.sponsors-line { 
  height: 3px; 
  width: 80px; 
  background: linear-gradient(90deg, transparent, #0d3b66); 
}
.sponsors-label {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: white;
  padding: 20px;
}
</style>
</head>
<body style="background: white; padding: 50px;">
<div class="sponsors-label">
  <span class="sponsors-line"></span>
  <span class="sponsors-title">OUR SPONSORS</span>
  <span class="sponsors-line" style="background: linear-gradient(90deg, #0d3b66, transparent);"></span>
</div>
</body>
</html>
